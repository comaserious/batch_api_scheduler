services:
  batch-automation-prod:
    build: .
    ports:
      - "5000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - ROOT_PATH=/v1/batch
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    networks:
      - batch-redis
    restart: unless-stopped

  batch-automation-dev:
    build: .
    ports:
      - "15000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - ROOT_PATH=/v1/dev/batch
    volumes:
      - ./data-dev:/app/data
      - ./config.yaml:/app/config.yaml
    networks:
      - batch-redis
    restart: unless-stopped

# batch-redis must be an external Docker network created beforehand.
# Create it with: docker network create batch-redis
networks:
  batch-redis:
    external: true